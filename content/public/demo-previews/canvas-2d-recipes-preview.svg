<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Canvas 2D Recipes Preview</title>
  <desc id="desc">A collage of expected output styles from canvas 2D recipes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#e2e8f0" />
    </linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#14b8a6" />
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#ef4444" />
    </linearGradient>
  </defs>

  <rect width="1200" height="680" fill="url(#bg)" rx="24" />
  <text x="48" y="66" fill="#0f172a" font-family="Inter, Segoe UI, sans-serif" font-size="38" font-weight="700">
    Canvas 2D Output Preview
  </text>
  <text x="48" y="100" fill="#334155" font-family="Inter, Segoe UI, sans-serif" font-size="21">
    Shapes, curves, gradients, text, clipping, image data, and animated redraw patterns.
  </text>

  <g transform="translate(48,130)">
    <rect x="0" y="0" width="350" height="240" rx="16" fill="#ffffff" stroke="#cbd5e1" />
    <rect x="22" y="24" width="130" height="78" rx="14" fill="#38bdf8" />
    <circle cx="245" cy="64" r="38" fill="#22c55e" />
    <path d="M24 162 C 120 92, 232 230, 326 160" stroke="#f97316" stroke-width="10" fill="none" stroke-linecap="round" />
    <path d="M24 202 L326 202" stroke="#1e293b" stroke-dasharray="14 9" stroke-width="4" />
  </g>

  <g transform="translate(424,130)">
    <rect x="0" y="0" width="350" height="240" rx="16" fill="#ffffff" stroke="#cbd5e1" />
    <rect x="22" y="24" width="304" height="74" rx="12" fill="url(#g1)" />
    <circle cx="95" cy="172" r="38" fill="url(#g2)" />
    <circle cx="175" cy="172" r="38" fill="#0ea5e9" opacity="0.6" />
    <circle cx="255" cy="172" r="38" fill="#111827" opacity="0.55" />
    <text x="22" y="226" fill="#334155" font-family="Inter, Segoe UI, sans-serif" font-size="18">gradients + compositing + alpha</text>
  </g>

  <g transform="translate(800,130)">
    <rect x="0" y="0" width="350" height="240" rx="16" fill="#ffffff" stroke="#cbd5e1" />
    <text x="28" y="84" fill="#111827" font-family="Georgia, serif" font-size="52" font-weight="700">Canvas</text>
    <text x="28" y="120" fill="#64748b" font-family="Inter, Segoe UI, sans-serif" font-size="18">metrics, baselines, alignment</text>
    <path d="M28 154 H324" stroke="#94a3b8" stroke-dasharray="10 8" stroke-width="3" />
    <path d="M28 194 H324" stroke="#94a3b8" stroke-dasharray="10 8" stroke-width="3" />
    <text x="28" y="228" fill="#334155" font-family="Inter, Segoe UI, sans-serif" font-size="18">text recipes</text>
  </g>

  <g transform="translate(48,400)">
    <rect x="0" y="0" width="520" height="230" rx="16" fill="#ffffff" stroke="#cbd5e1" />
    <rect x="22" y="28" width="478" height="168" rx="12" fill="#0f172a" />
    <circle cx="88" cy="112" r="18" fill="#22d3ee" />
    <circle cx="152" cy="96" r="18" fill="#34d399" />
    <circle cx="216" cy="122" r="18" fill="#f59e0b" />
    <circle cx="280" cy="104" r="18" fill="#f97316" />
    <circle cx="344" cy="126" r="18" fill="#ef4444" />
    <circle cx="408" cy="98" r="18" fill="#a78bfa" />
    <text x="22" y="218" fill="#334155" font-family="Inter, Segoe UI, sans-serif" font-size="18">animation with clearRect + redraw</text>
  </g>

  <g transform="translate(594,400)">
    <rect x="0" y="0" width="556" height="230" rx="16" fill="#ffffff" stroke="#cbd5e1" />
    <rect x="26" y="30" width="244" height="164" rx="10" fill="#e2e8f0" />
    <rect x="282" y="30" width="248" height="164" rx="10" fill="#e2e8f0" />
    <path d="M50 58 L246 58 L246 170 L50 170 Z" fill="#cbd5e1" />
    <path d="M305 58 L506 58 L506 170 L305 170 Z" fill="#1e293b" />
    <text x="38" y="212" fill="#334155" font-family="Inter, Segoe UI, sans-serif" font-size="18">ImageData and snapshot/export flows</text>
  </g>
