<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Audio Web API Preview</title>
  <desc id="desc">Visualization of expected waveform, analyser bars, and compression curve for web-style audio demos.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>
  </defs>

  <rect width="1200" height="700" fill="url(#bg)" rx="24" />

  <text x="50" y="68" fill="#f8fafc" font-family="Inter, Segoe UI, sans-serif" font-size="40" font-weight="700">
    Audio Demo Output Preview
  </text>
  <text x="50" y="104" fill="#cbd5e1" font-family="Inter, Segoe UI, sans-serif" font-size="22">
    Expected analyzer view, stereo movement, and dynamics shape from the sample graphs.
  </text>

  <g transform="translate(50,140)">
    <rect x="0" y="0" width="760" height="220" rx="16" fill="#000814" stroke="#1e293b" stroke-width="2" />
    <text x="20" y="34" fill="#67e8f9" font-family="Inter, Segoe UI, sans-serif" font-size="20" font-weight="600">Waveform / Envelope</text>
    <path d="M24 130 C 66 40, 108 40, 150 130 S 234 220, 276 130 S 360 40, 402 130 S 486 220, 528 130 S 612 40, 654 130 S 738 220, 744 130" fill="none" stroke="url(#wave)" stroke-width="6" stroke-linecap="round" />
    <path d="M24 178 L24 88 L88 88 L142 120 L218 120 L290 166 L744 166" fill="none" stroke="#f59e0b" stroke-width="4" stroke-linecap="round" />
    <text x="24" y="206" fill="#94a3b8" font-family="Inter, Segoe UI, sans-serif" font-size="15">cyan: oscillator output  orange: ADSR automation</text>
  </g>

  <g transform="translate(50,390)">
    <rect x="0" y="0" width="500" height="250" rx="16" fill="#000814" stroke="#1e293b" stroke-width="2" />
    <text x="20" y="34" fill="#86efac" font-family="Inter, Segoe UI, sans-serif" font-size="20" font-weight="600">Analyser Frequency Bins</text>
    <rect x="36" y="198" width="20" height="32" fill="#22d3ee" />
    <rect x="70" y="172" width="20" height="58" fill="#22d3ee" />
    <rect x="104" y="146" width="20" height="84" fill="#22d3ee" />
    <rect x="138" y="124" width="20" height="106" fill="#22d3ee" />
    <rect x="172" y="104" width="20" height="126" fill="#22d3ee" />
    <rect x="206" y="132" width="20" height="98" fill="#22d3ee" />
    <rect x="240" y="154" width="20" height="76" fill="#22d3ee" />
    <rect x="274" y="184" width="20" height="46" fill="#22d3ee" />
    <rect x="308" y="164" width="20" height="66" fill="#34d399" />
    <rect x="342" y="142" width="20" height="88" fill="#34d399" />
    <rect x="376" y="118" width="20" height="112" fill="#34d399" />
    <rect x="410" y="154" width="20" height="76" fill="#34d399" />
    <text x="20" y="232" fill="#94a3b8" font-family="Inter, Segoe UI, sans-serif" font-size="15">matches getByteFrequencyData style visualizers</text>
  </g>

  <g transform="translate(580,390)">
    <rect x="0" y="0" width="570" height="250" rx="16" fill="#000814" stroke="#1e293b" stroke-width="2" />
    <text x="20" y="34" fill="#fca5a5" font-family="Inter, Segoe UI, sans-serif" font-size="20" font-weight="600">Dynamics Compression Curve</text>
    <line x1="40" y1="210" x2="530" y2="210" stroke="#334155" stroke-width="2" />
    <line x1="40" y1="210" x2="40" y2="54" stroke="#334155" stroke-width="2" />
    <path d="M40 210 L210 126 Q280 94 352 90 Q432 86 530 84" fill="none" stroke="#f97316" stroke-width="5" stroke-linecap="round" />
    <line x1="40" y1="210" x2="530" y2="54" stroke="#64748b" stroke-width="2" stroke-dasharray="10 8" />
    <text x="20" y="238" fill="#94a3b8" font-family="Inter, Segoe UI, sans-serif" font-size="15">orange: compressed transfer curve, gray: uncompressed line</text>
  </g>
</svg>
