<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">WebGPU Recipes Preview</title>
  <desc id="desc">Preview of adapter-device-pipeline flow and triangle render output for WebGPU recipes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#04111f" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="tri" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>
  </defs>

  <rect width="1200" height="620" fill="url(#bg)" rx="20" />
  <text x="44" y="62" fill="#ecfeff" font-family="Inter, Segoe UI, sans-serif" font-size="38" font-weight="700">
    WebGPU Demo Output Preview
  </text>
  <text x="44" y="94" fill="#a5f3fc" font-family="Inter, Segoe UI, sans-serif" font-size="21">
    adapter -> device -> context.configure -> command encoder -> submit.
  </text>

  <g transform="translate(44,126)">
    <rect x="0" y="0" width="1112" height="452" rx="16" fill="#020617" stroke="#1e293b" stroke-width="2" />

    <g transform="translate(26,28)">
      <rect x="0" y="0" width="190" height="82" rx="12" fill="#1d4ed8" />
      <text x="20" y="48" fill="#dbeafe" font-family="Inter, Segoe UI, sans-serif" font-size="24" font-weight="600">Adapter</text>

      <rect x="226" y="0" width="190" height="82" rx="12" fill="#0e7490" />
      <text x="254" y="48" fill="#cffafe" font-family="Inter, Segoe UI, sans-serif" font-size="24" font-weight="600">Device</text>

      <rect x="452" y="0" width="280" height="82" rx="12" fill="#15803d" />
      <text x="474" y="48" fill="#dcfce7" font-family="Inter, Segoe UI, sans-serif" font-size="24" font-weight="600">Context Configure</text>

      <rect x="768" y="0" width="290" height="82" rx="12" fill="#7c3aed" />
      <text x="792" y="48" fill="#ede9fe" font-family="Inter, Segoe UI, sans-serif" font-size="24" font-weight="600">Submit Queue</text>

      <path d="M194 41 H216" stroke="#93c5fd" stroke-width="4" />
      <path d="M420 41 H442" stroke="#67e8f9" stroke-width="4" />
      <path d="M736 41 H758" stroke="#86efac" stroke-width="4" />
    </g>

    <g transform="translate(42,158)">
      <rect x="0" y="0" width="700" height="252" rx="12" fill="#000814" stroke="#334155" />
      <polygon points="350,38 160,220 542,220" fill="url(#tri)" />
      <text x="22" y="36" fill="#93c5fd" font-family="Inter, Segoe UI, sans-serif" font-size="18">render pass output</text>
    </g>

    <g transform="translate(768,158)">
      <rect x="0" y="0" width="314" height="252" rx="12" fill="#0f172a" stroke="#334155" />
      <text x="20" y="38" fill="#f8fafc" font-family="Inter, Segoe UI, sans-serif" font-size="22" font-weight="600">Recipe Coverage</text>
      <text x="20" y="78" fill="#cbd5e1" font-family="Inter, Segoe UI, sans-serif" font-size="17">1. clear pass</text>
      <text x="20" y="106" fill="#cbd5e1" font-family="Inter, Segoe UI, sans-serif" font-size="17">2. shader module</text>
      <text x="20" y="134" fill="#cbd5e1" font-family="Inter, Segoe UI, sans-serif" font-size="17">3. render pipeline</text>
      <text x="20" y="162" fill="#cbd5e1" font-family="Inter, Segoe UI, sans-serif" font-size="17">4. draw triangle</text>
      <text x="20" y="190" fill="#cbd5e1" font-family="Inter, Segoe UI, sans-serif" font-size="17">5-8. uniforms, resize, loop, checks</text>
    </g>
  </g>
</svg>
