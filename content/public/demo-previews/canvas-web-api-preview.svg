<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Canvas Web API Preview</title>
  <desc id="desc">Preview illustration for canvas 2D, WebGL, and WebGPU examples.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f2937" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="tri" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#22c55e" />
    </linearGradient>
  </defs>

  <rect width="1200" height="700" fill="url(#bg)" rx="24" />

  <text x="52" y="68" fill="#f8fafc" font-family="Inter, Segoe UI, sans-serif" font-size="40" font-weight="700">
    Canvas Demo Output Preview
  </text>
  <text x="52" y="104" fill="#cbd5e1" font-family="Inter, Segoe UI, sans-serif" font-size="22">
    Expected look across 2D rendering, WebGL, and WebGPU paths.
  </text>

  <g transform="translate(52,140)">
    <rect x="0" y="0" width="345" height="500" fill="url(#panel)" stroke="#334155" stroke-width="2" rx="18" />
    <text x="22" y="42" fill="#93c5fd" font-family="Inter, Segoe UI, sans-serif" font-size="24" font-weight="600">2D Canvas</text>
    <rect x="24" y="72" width="150" height="86" rx="14" fill="#22d3ee" />
    <circle cx="250" cy="112" r="44" fill="#34d399" />
    <path d="M24 210 C 120 140, 220 280, 320 210" stroke="#f97316" stroke-width="10" fill="none" stroke-linecap="round" />
    <path d="M24 270 L 320 270" stroke="#e2e8f0" stroke-width="4" stroke-dasharray="14 10" />
    <text x="24" y="335" fill="#e2e8f0" font-family="Inter, Segoe UI, sans-serif" font-size="20">shapes + gradients + text</text>
    <text x="24" y="370" fill="#94a3b8" font-family="Inter, Segoe UI, sans-serif" font-size="18">recipes 1-18</text>
  </g>

  <g transform="translate(427,140)">
    <rect x="0" y="0" width="345" height="500" fill="url(#panel)" stroke="#334155" stroke-width="2" rx="18" />
    <text x="22" y="42" fill="#67e8f9" font-family="Inter, Segoe UI, sans-serif" font-size="24" font-weight="600">WebGL</text>
    <rect x="22" y="72" width="301" height="242" rx="10" fill="#020617" stroke="#0f172a" />
    <polygon points="172,105 72,278 274,278" fill="url(#tri)" />
    <line x1="72" y1="280" x2="274" y2="280" stroke="#334155" stroke-width="2" />
    <line x1="72" y1="280" x2="172" y2="105" stroke="#334155" stroke-width="2" />
    <line x1="274" y1="280" x2="172" y2="105" stroke="#334155" stroke-width="2" />
    <text x="24" y="352" fill="#e2e8f0" font-family="Inter, Segoe UI, sans-serif" font-size="20">buffers + shaders + uniforms</text>
    <text x="24" y="387" fill="#94a3b8" font-family="Inter, Segoe UI, sans-serif" font-size="18">recipes 1-10</text>
  </g>

  <g transform="translate(802,140)">
    <rect x="0" y="0" width="345" height="500" fill="url(#panel)" stroke="#334155" stroke-width="2" rx="18" />
    <text x="22" y="42" fill="#5eead4" font-family="Inter, Segoe UI, sans-serif" font-size="24" font-weight="600">WebGPU</text>
    <rect x="22" y="72" width="301" height="150" rx="10" fill="#0b1120" stroke="#1e293b" />
    <rect x="36" y="98" width="86" height="42" rx="8" fill="#1d4ed8" />
    <rect x="132" y="98" width="86" height="42" rx="8" fill="#0891b2" />
    <rect x="228" y="98" width="80" height="42" rx="8" fill="#16a34a" />
    <text x="44" y="124" fill="#dbeafe" font-family="Inter, Segoe UI, sans-serif" font-size="14">adapter</text>
    <text x="141" y="124" fill="#cffafe" font-family="Inter, Segoe UI, sans-serif" font-size="14">device</text>
    <text x="236" y="124" fill="#dcfce7" font-family="Inter, Segoe UI, sans-serif" font-size="14">draw</text>
    <rect x="22" y="244" width="301" height="138" rx="10" fill="#020617" />
    <polygon points="172,258 76,364 268,364" fill="#34d399" />
    <text x="24" y="432" fill="#e2e8f0" font-family="Inter, Segoe UI, sans-serif" font-size="20">pipeline + command encoder</text>
    <text x="24" y="467" fill="#94a3b8" font-family="Inter, Segoe UI, sans-serif" font-size="18">recipes 1-8</text>
  </g>
</svg>
